<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Decide.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@700&family=Space+Mono&family=Fredoka+One&family=Pacifico&family=Lobster+Two:ital@1&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'MilkChoco';
    src: url('Milk Choco.otf') format('opentype');
  }
  @font-face {
    font-family: 'Loverine';
    src: url('Loverine.otf') format('opentype');
  }
  :root {
    --bg: #F8F6F3;
    --surface: #fff;
    --surface2: #EFE9DF;
    --border: rgba(40,50,82,0.11);
    --gold: #DD91BE;
    --gold-light: rgba(221,145,190,0.12);
    --coral: #E05555;
    --green: #1A9E6E;
    --text: #283252;
    --muted: rgba(40,50,82,0.44);
    --muted2: rgba(40,50,82,0.22);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-pill: 999px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* ─── HEADER ─── */
  .header { padding: 52px 24px 20px; flex-shrink: 0; text-align: center; }

  #flashLogo {
    font-size: 80px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
    margin-bottom: 10px;
    margin-top: -35px;
    line-height: 1.1;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #flashLogo img { width: 340px; max-width: 100%; height: 90px; object-fit: contain; display: block; }
  #flashLogo img.logo-13 { width: 349px; max-width: 100%; height: 93px; margin-left: 5px; }

  .tagline { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  /* ─── TAB NAV ─── */
  .tab-nav-wrap { padding: 0 24px 20px; flex-shrink: 0; margin-top: 10px; }
  .tab-nav {
    display: flex;
    background: #EEEAE3;
    border-radius: var(--radius-pill);
    padding: 4px;
    border: 1px solid rgba(40,50,82,0.08);
    position: relative;
    box-shadow: inset 0 1px 3px rgba(40,50,82,0.08);
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    padding: 6px 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius-pill);
    transition: color 0.2s;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 3px;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--text); font-weight: 700; }
  .tab-btn .ticon { font-size: 13px; }
  .tab-slider {
    position: absolute;
    top: 4px;
    height: calc(100% - 8px);
    background: var(--bg);
    border-radius: var(--radius-pill);
    border: 2px solid var(--text);
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s;
    z-index: 0;
    box-shadow: 0 1px 4px rgba(40,50,82,0.1);
    pointer-events: none;
  }

  /* ─── TAB CONTENT ─── */
  .tab-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── OPTIONS EDITOR ─── */
  .options-editor { padding: 0 24px 20px; border-bottom: 1px solid var(--border); }
  .options-section-label {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
  }

  .add-option-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-option-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 3px rgba(40,50,82,0.06);
  }
  .add-option-row input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(221,145,190,0.15); }
  .add-option-row input::placeholder { color: var(--muted2); }
  .btn-add {
    background: var(--text);
    border: none;
    border-radius: var(--radius-sm);
    width: 44px; height: 44px;
    cursor: pointer;
    font-size: 22px;
    color: #fff;
    font-weight: 300;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add:hover { transform: scale(1.05); opacity: 0.85; }
  .btn-add:active { transform: scale(0.95); }

  /* Quick fills + count row */
  .opt-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .option-count-sm { font-size: 11px; color: var(--muted); }
  .option-count-sm span { color: var(--gold); font-weight: 600; }
  .quick-row { display: flex; gap: 6px; }
  .quick-btn {
    background: #202759;
    border: none;
    border-radius: var(--radius-pill);
    padding: 9px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
    box-shadow: 0 3px 10px rgba(32,39,89,0.25);
  }
  .quick-btn:hover { opacity: 0.85; }

  .btn-clear-all {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #202759;
    cursor: pointer;
    padding: 0;
    opacity: 0.9;
    transition: opacity 0.15s;
    display: none;
  }
  .btn-clear-all:hover { opacity: 1; text-decoration: underline; }

  .btn-toggle-chips {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #202759;
    cursor: pointer;
    padding: 0;
    opacity: 0.7;
    transition: opacity 0.15s;
    display: none;
  }
  .btn-toggle-chips:hover { opacity: 1; text-decoration: underline; }

  .chips-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
  }

  .chips-wrap.chips-hidden { display: none; }

  /* Chips — shown BELOW the input */
  .chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 0;
  }
  .chip {
    background: #fff;
    border: 2px solid var(--gold);
    border-radius: var(--radius-pill);
    padding: 6px 10px 6px 13px;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 7px;
    animation: chipIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes chipIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .chip-remove {
    width: 17px; height: 17px;
    background: rgba(221,145,190,0.15);
    border: none;
    border-radius: 50%;
    color: var(--gold);
    cursor: pointer;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .chip-remove:hover { background: var(--coral); color: #fff; }

  /* ─── TAB BODY ─── */
  .tab-body { padding: 20px 24px 40px; }

  /* ─── EMPTY STATE ─── */
  .empty-state { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .empty-state .eicon { font-size: 34px; display: block; margin-bottom: 10px; }

  /* ════════════════════════════════
     SLOT MACHINE
  ════════════════════════════════ */
  .slot-machine { display: flex; flex-direction: column; align-items: center; }

  .slot-cabinet {
    position: relative;
    width: 100%;
    max-width: 300px;
  }

  .slot-body {
    background: var(--surface);
    border: 2.5px solid var(--text);
    border-radius: 24px;
    padding: 20px 20px 0 20px;
    position: relative;
    box-shadow: 4px 6px 0 rgba(40,50,82,0.1), 0 2px 16px rgba(40,50,82,0.07);
    overflow: visible;
  }

  .slot-lights {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .slot-light {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted2);
    border: 1.5px solid var(--border);
    transition: background 0.12s, box-shadow 0.12s;
  }
  .slot-light.on-a { background: #DD91BE; box-shadow: 0 0 8px rgba(221,145,190,0.8); border-color: #DD91BE; }
  .slot-light.on-b { background: #FFBCE4; box-shadow: 0 0 8px rgba(255,188,228,0.8); border-color: #FFBCE4; }

  /* Reel window */
  .slot-window {
    background: var(--bg);
    border: 2px solid var(--text);
    border-radius: 14px;
    height: 180px;
    overflow: hidden;
    position: relative;
  }

  /* Top & bottom fade */
  .slot-fade {
    position: absolute;
    left: 0; right: 0;
    height: 56px;
    z-index: 5;
    pointer-events: none;
  }
  .slot-fade.top { top: 0; background: linear-gradient(to bottom, #F8F6F3 10%, transparent); }
  .slot-fade.bot { bottom: 0; background: linear-gradient(to top, #F8F6F3 10%, transparent); }

  /* Two selection lines framing the winner */
  .slot-win-top,
  .slot-win-bot {
    position: absolute;
    left: 10px; right: 10px;
    height: 1px;
    background: #C8C2B8;
    z-index: 6;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
    border-radius: 1px;
  }
  .slot-win-top { top: calc(50% - 32px); }
  .slot-win-bot { top: calc(50% + 30px); }
  .slot-win-top.visible,
  .slot-win-bot.visible { opacity: 1; }

  /* Reel items */
  .reel-strip {
    display: flex;
    flex-direction: column;
    will-change: transform;
  }
  .reel-item {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    padding: 0 16px;
    text-align: center;
    line-height: 1.2;
    flex-shrink: 0;
    filter: blur(0px);
    opacity: 1;
    transition: filter 0.4s ease, opacity 0.4s ease, color 0.2s;
  }
  /* Non-winner items blur after spin stops */
  .reel-item.blurred {
    filter: blur(2.5px);
    opacity: 0.35;
  }
  .reel-item.winner-item {
    color: var(--gold);
    font-weight: 700;
    filter: blur(0px) !important;
    opacity: 1 !important;
  }

  /* Hatched base */
  .slot-base {
    background: repeating-linear-gradient(
      -45deg,
      rgba(40,50,82,0.06) 0px,
      rgba(40,50,82,0.06) 4px,
      transparent 4px,
      transparent 12px
    );
    border: 2.5px solid var(--text);
    border-top: none;
    border-radius: 0 0 20px 20px;
    height: 28px;
    margin: 0 -2px;
    position: relative;
    top: -2px;
  }

  /* ── LEVER ── */
  .slot-lever-wrap {
    position: absolute;
    right: -54px;
    bottom: 20px;
    width: 50px;
    height: 164px;
    cursor: pointer;
    z-index: 10;
    user-select: none;
  }
  .slot-lever-wrap:active { opacity: 0.85; }

  .pull-lever-hint {
    position: absolute;
    right: -50px;
    top: -50px;
    width: 90px;
    text-align: center;
    pointer-events: none;
    z-index: 11;
  }

  @keyframes leverHintPulse {
    0%,100% { filter: none; }
    50%     { filter: brightness(1.1) saturate(0.6); }
  }
  @keyframes leverHintFade {
    0%,100% { filter: none; }
    50%     { filter: brightness(1.15) saturate(0.5) hue-rotate(-8deg); }
  }

  .lever-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    /* pivot at the base circle center */
    transform-origin: 25px 152px;
    animation: leverIdle 1.8s ease-in-out infinite;
  }

  @keyframes leverIdle {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(6deg); }
    50%  { transform: rotate(-5deg); }
    75%  { transform: rotate(4deg); }
    100% { transform: rotate(0deg); }
  }

  @keyframes leverPull {
    0%   { transform: rotate(0deg); }
    30%  { transform: rotate(-38deg); }
    60%  { transform: rotate(-38deg); }
    85%  { transform: rotate(3deg); }
    100% { transform: rotate(0deg); }
  }
  .lever-svg.pulling {
    animation: leverPull 0.75s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  .btn-spin-action {
    margin-top: 20px;
    background: #202759;
    color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    padding: 12px 48px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(32,39,89,0.28);
    transition: transform 0.12s;
    /* no opacity transition — prevents the mid-state grey shading */
  }
  .btn-spin-action:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-spin-action:active:not(:disabled) { transform: scale(0.97); }
  .btn-spin-action:disabled {
    background: #202759;
    color: rgba(255,255,255,0.45);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* ════════════════════════════════
     RANK TAB
  ════════════════════════════════ */
  /* ── Card shuffle loading animation ── */
  .ai-loading { margin-bottom: 16px; width: 100%; }

  .shuffle-cards {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100px;
    position: relative;
  }
  .shuffle-card {
    position: absolute;
    width: 100%;
    height: 56px;
    background: var(--surface);
    border: 2px solid #202759;
    border-radius: var(--radius-sm);
    opacity: 0.85;
  }
  .shuffle-card:nth-child(1) { animation: shuffle1 1.1s ease-in-out infinite; }
  .shuffle-card:nth-child(2) { animation: shuffle2 1.1s ease-in-out infinite; }
  .shuffle-card:nth-child(3) { animation: shuffle3 1.1s ease-in-out infinite; }

  @keyframes shuffle1 {
    0%,100% { transform: translateY(0px) scale(1);   opacity: 0.9; z-index: 3; }
    33%      { transform: translateY(-22px) scale(0.96); opacity: 0.7; z-index: 1; }
    66%      { transform: translateY(11px) scale(0.98);  opacity: 0.8; z-index: 2; }
  }
  @keyframes shuffle2 {
    0%,100% { transform: translateY(11px) scale(0.98); opacity: 0.8; z-index: 2; }
    33%      { transform: translateY(0px) scale(1);    opacity: 0.9; z-index: 3; }
    66%      { transform: translateY(-22px) scale(0.96); opacity: 0.7; z-index: 1; }
  }
  @keyframes shuffle3 {
    0%,100% { transform: translateY(-22px) scale(0.96); opacity: 0.7; z-index: 1; }
    33%      { transform: translateY(11px) scale(0.98);  opacity: 0.8; z-index: 2; }
    66%      { transform: translateY(0px) scale(1);    opacity: 0.9; z-index: 3; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .rank-list { display: flex; flex-direction: column; gap: 8px; }

  /* Flip wrapper for first rank item */
  .rank-flip-wrap {
    perspective: 900px;
    animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1) both;
    transform: translateY(-3px);
    filter: drop-shadow(0 6px 16px rgba(32,39,89,0.18));
  }
  .rank-flip-inner {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
    min-height: 62px;
  }
  .rank-flip-inner.flipped { transform: rotateX(180deg); }

  .rank-flip-front,
  .rank-flip-back {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 2px solid #202759;
    border-radius: var(--radius-sm);
    background: var(--surface);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .rank-flip-back {
    position: absolute;
    inset: 0;
    transform: rotateX(180deg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    cursor: pointer;
    overflow: hidden;
    text-align: center;
    padding: 14px 18px;
  }
  .rank-flip-back-label { display: none; }
  .rank-flip-back-text {
    font-size: 12px;
    color: #DD91BE;
    line-height: 1.5;
    font-weight: 500;
  }

  .rank-item {
    background: var(--surface);
    border: 2px solid #202759;
    border-radius: var(--radius-sm);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1) both;
  }
  .rank-item.rank-first {
    border-color: #202759;
    background: var(--surface);
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .rank-num { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--muted2); width: 28px; text-align: center; flex-shrink: 0; }
  .rank-first .rank-num { color: var(--gold); }
  .rank-item-body { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .rank-item-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .rank-item:not(.rank-first) .rank-item-name { color: #6B7A9E; }
  .rank-item:not(.rank-first) .rank-num { color: #A0ABCC; }
  .rank-bar-wrap { display: none; }
  .why-btn {
    background: #DD91BE;
    border: none;
    border-radius: var(--radius-pill);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .why-btn:hover { opacity: 0.85; }
  /* why-text handled by card flip */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .btn-rerank {
    width: 100%;
    background: #202759;
    border: none;
    border-radius: var(--radius-pill);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 4px 14px rgba(32,39,89,0.28);
    transition: opacity 0.15s, transform 0.12s;
    letter-spacing: 0.02em;
  }
  .btn-rerank:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-rerank:active { transform: scale(0.98); }

  /* ════════════════════════════════
     MAGIC 8 BALL
  ════════════════════════════════ */
  .eight-ball-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 24px 40px; }

  
  .eight-ball-hint { font-size: 13px; color: var(--muted); margin-bottom: 28px; text-align: center; line-height: 1.5; }
  .eight-ball {
    width: 240px; height: 240px;
    border-radius: 50%;
    position: relative;
    cursor: pointer;
    user-select: none;
    background:
      radial-gradient(ellipse 60% 40% at 35% 30%, rgba(255,255,255,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 80% 80% at 60% 70%, rgba(150,160,200,0.3) 0%, transparent 70%),
      radial-gradient(circle at 50% 50%, #9DA8C8 0%, #8090B8 35%, #6878A8 60%, #5060A0 80%, #3C5090 100%);
    box-shadow: inset -8px -8px 20px rgba(30,40,80,0.35), inset 6px 4px 16px rgba(255,255,255,0.2), 0 16px 48px rgba(40,50,82,0.25), 0 4px 12px rgba(40,50,82,0.15);
    transition: transform 0.1s;
  }
  .eight-ball::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: radial-gradient(ellipse 50% 30% at 25% 60%, rgba(200,210,240,0.2) 0%, transparent 70%), radial-gradient(ellipse 40% 50% at 70% 30%, rgba(180,190,230,0.15) 0%, transparent 60%); }

// ── TAB SLIDER ──
function updateSlider(btn) {
  const nav = document.getElementById('tabNav');
  const slider = document.getElementById('tabSlider');
  const nr = nav.getBoundingClientRect();
  const br = btn.getBoundingClientRect();
  slider.style.left = (br.left - nr.left) + 'px';
  slider.style.width = br.width + 'px';
}
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  updateSlider(btn);
  if (name === 'spinner') refreshSlot();
}
window.addEventListener('load', () => { const ab = document.querySelector('.tab-btn.active'); if (ab) updateSlider(ab); refreshSlot(); });

// ── OPTIONS ──
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function addOption(tab) {
  const input = document.getElementById('optInput' + cap(tab));
  const text = input.value.trim();
  if (!text || options.length >= 10 || options.includes(text)) { input.value = ''; return; }
  options.push(text);
  input.value = '';
  input.focus();
  renderAllChips();
  onOptionsChanged();
}

document.querySelectorAll('[id^="optInput"]').forEach(input => {
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') addOption(input.id.replace('optInput','').toLowerCase());
  });
});

function removeOption(i) { options.splice(i, 1); renderAllChips(); onOptionsChanged(); }

function renderAllChips() {
  ['spinner','rank','timer'].forEach(tab => {
    const wrap = document.getElementById('chips' + cap(tab));
    const cnt  = document.getElementById('optCount' + cap(tab));
    if (wrap) wrap.innerHTML = options.map((o,i) =>
      `<div class="chip">${o}<button class="chip-remove" onclick="removeOption(${i})">✕</button></div>`
    ).join('');
    if (cnt) cnt.textContent = options.length;
  });
  // Show/hide action buttons based on whether options exist
  document.querySelectorAll('.btn-clear-all').forEach(btn => {
    btn.style.display = options.length > 0 ? 'inline' : 'none';
  });
  document.querySelectorAll('.btn-toggle-chips').forEach(btn => {

}

function onOptionsChanged() {

  document.getElementById('rank-content').classList.add('hidden');

  document.getElementById('slot-empty').classList.toggle('hidden', ok);
  document.getElementById('slot-content').classList.toggle('hidden', !ok);
  if (ok) refreshSlot();
}

function clearAll() {

// ── SLOT MACHINE ──
const ITEM_H = 60;

function buildStrip() {
  const strip = document.getElementById('strip0');
  if (!strip || options.length === 0) return;
  // Long shuffled list for a convincing spin
  let items = [];
  for (let r = 0; r < 12; r++) items = items.concat([...options].sort(() => Math.random() - 0.5));
  items = items.concat([...options]); // safety tail
  strip.innerHTML = items.map(o => `<div class="reel-item">${o}</div>`).join('');
  strip.style.transition = 'none';
  strip.style.transform = 'translateY(0)';
}

function refreshSlot() {
  if (options.length < 2) return;
  // Reset blur/highlight from previous spin
  const strip = document.getElementById('strip0');
  if (strip) strip.querySelectorAll('.reel-item').forEach(el => {
    el.classList.remove('blurred','winner-item');
  });
  buildStrip();
  document.getElementById('winTop').classList.remove('visible');
  document.getElementById('winBot').classList.remove('visible');
}

let lightTimer = null;
function animateLights(on) {
  clearInterval(lightTimer);
  for (let i=0;i<7;i++) {
    const l = document.getElementById('l'+i);
    l.classList.remove('on-a','on-b');
  }
  if (!on) return;
  let idx = 0;
  lightTimer = setInterval(() => {
    for (let i=0;i<7;i++) {
      const l = document.getElementById('l'+i);
      const active = (i===idx%7 || i===(idx+3)%7);
      l.classList.remove('on-a','on-b');
      if (active) l.classList.add(idx%2===0 ? 'on-a' : 'on-b');
    }
    idx++;
  }, 110);
}

// Slot easing: fast linear phase for the first 45% of time (covers 72% of distance),
// then heavy ease-out-quart for the final 55% of time (covers remaining 28%).
// This feels like a real spinning reel — full speed, then friction brings it to a stop.
function slotEase(t) {
  if (t < 0.45) {
    return t * (0.72 / 0.45);                        // fast linear
  }
  const t2 = (t - 0.45) / 0.55;                      // normalise tail to 0-1
  return 0.72 + 0.28 * (1 - Math.pow(1 - t2, 4));    // ease-out quart
}

function pullSlot() {
  if (isSlotSpinning || options.length < 2) return;
  isSlotSpinning = true;

  // Reset win lines and blur from previous spin
  document.getElementById('winTop').classList.remove('visible');
  document.getElementById('winBot').classList.remove('visible');

  const oldStrip = document.getElementById('strip0');
  if (oldStrip) oldStrip.querySelectorAll('.reel-item').forEach(el => {
    el.classList.remove('blurred', 'winner-item');
    el.style.filter = '';
    el.style.opacity = '';
  });

  // Fresh strip every pull
  buildStrip();

  // Animate lever
  const leverSvg = document.getElementById('leverSvg');
  leverSvg.classList.remove('pulling');
  void leverSvg.offsetWidth;
  leverSvg.classList.add('pulling');

  animateLights(true);
  if (typeof playSpinSound === 'function') playSpinSound();

  // Pick winner (AI-weighted)
  const weights = options.map(o => (aiResult && o === aiResult.winner) ? 1.5 : 1);
  const totalW = weights.reduce((a,b) => a+b, 0);
  let rand = Math.random() * totalW;
  let winOptIdx = 0;
  for (let i=0;i<weights.length;i++) { rand -= weights[i]; if (rand <= 0) { winOptIdx = i; break; } }
  const winner = options[winOptIdx];

  const strip = document.getElementById('strip0');
  const items = strip.querySelectorAll('.reel-item');

  // Find winner far enough down for a full spin
  const minIdx = Math.floor(items.length * 0.60);
  let targetIdx = minIdx;
  items.forEach((el, i) => { if (i >= minIdx && el.textContent === winner) targetIdx = i; });

  const startY   = 0;
  const targetY  = -((targetIdx - 1) * ITEM_H);
  const totalDist = targetY - startY;           // negative (scrolls up)
  const duration  = 3400;                       // ms — longer = more satisfying

  // Disable the spin button while running
  const sb = document.getElementById('spinActionBtn');
  if (sb) sb.disabled = true;

  // Double rAF so the browser commits translateY(0) before we start
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      strip.style.transition = 'none';

      const startTime = performance.now();

      function animate(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const eased = slotEase(t);

        strip.style.transform = `translateY(${startY + totalDist * eased}px)`;

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          // Snap to exact position
          strip.style.transform = `translateY(${targetY}px)`;

          // Reveal result
          items.forEach((el, i) => {
            if (i === targetIdx) {
              el.classList.add('winner-item');
              el.classList.remove('blurred');
            } else {
              el.classList.add('blurred');
              el.classList.remove('winner-item');
            }
          });

          setTimeout(() => {
            document.getElementById('winTop').classList.add('visible');
            document.getElementById('winBot').classList.add('visible');
          }, 60);

          if (typeof stopSpinSound === 'function') stopSpinSound();
          if (typeof playResultSound === 'function') playResultSound();
          animateLights(false);
          isSlotSpinning = false;
          if (sb) sb.disabled = false;
        }
      }

      requestAnimationFrame(animate);
    });
  });
}

// ── RANK ──
function fakeAiRank() {
  if (options.length < 2) return;
  document.getElementById('ai-loading').classList.remove('hidden');
  document.getElementById('rank-content').classList.add('hidden');
  setTimeout(() => {
    const shuffled = [...options].sort(() => Math.random() - 0.3);
    const winner = shuffled[0];
    const reasoning = MOCK_REASONINGS[Math.floor(Math.random()*MOCK_REASONINGS.length)];
    const tagline = MOCK_TAGLINES[Math.floor(Math.random()*MOCK_TAGLINES.length)];
    aiResult = { winner, shuffled, reasoning, tagline };

    document.getElementById('rankList').innerHTML = shuffled.map((o,i) => {
      if (i === 0) {
        return `<div class="rank-flip-wrap" style="animation-delay:0s">
          <div class="rank-flip-inner" id="rankFlipInner">
            <div class="rank-flip-front">
              <div class="rank-num" style="color:var(--gold)">1</div>
              <div class="rank-item-body">
                <div style="display:flex;align-items:center;width:100%;justify-content:center;gap:10px;position:relative;">
                  <div class="rank-item-name" style="text-align:center;">${o}</div>
                  <button class="why-btn" onclick="flipRankCard()" style="position:absolute;right:0;">Why this?</button>
                </div>
              </div>
            </div>
            <div class="rank-flip-back" onclick="flipRankCard()">
<div class="rank-flip-back-text">${reasoning}</div>
            </div>
          </div>
        </div>`;
      }
      return `<div class="rank-item" style="animation-delay:${i*0.07}s">
        <div class="rank-num">${i+1}</div>
        <div class="rank-item-body">
          <div style="display:flex;align-items:center;width:100%;justify-content:center;">
            <div class="rank-item-name">${o}</div>
          </div>
        </div>
      </div>`;
    }).join('');

    if (typeof stopShuffleSound === 'function') stopShuffleSound();
    document.getElementById('ai-loading').classList.add('hidden');
    document.getElementById('rank-content').classList.remove('hidden');
    document.getElementById('rerankBtn').classList.remove('hidden');

  }, 1400);
}

function flipRankCard() {
  const inner = document.getElementById('rankFlipInner');
  if (inner) {
    inner.classList.toggle('flipped');
    if (typeof playFlipSound === 'function') playFlipSound();
  }
}

// ── MAGIC 8 BALL ──
let isBallShaking = false;

function tapCard() {
  if (typeof playFlipSound === 'function') playFlipSound();
  const flipInner = document.getElementById('cardFlipInner');
  if (flipInner.classList.contains('flipped')) {
    // Already showing answer — flip back to front (reset)
    flipInner.classList.remove('flipped');
    // Reset ball face too
    document.getElementById('ballCircle').style.opacity = '1';
    document.getElementById('ballAnswer').classList.remove('visible');
  } else {
    // Showing front — shake and reveal
    shakeBall();
  }
}

function shakeBall() {
  if (isBallShaking) return;
  isBallShaking = true;
  const ball = document.getElementById('eightBall');
  const circle = document.getElementById('ballCircle');
  const answerDiv = document.getElementById('ballAnswer');
  const answerText = document.getElementById('ballAnswerText');
  const responseEl = document.getElementById('ballResponse');
  const flipInner = document.getElementById('cardFlipInner');

  // Ensure card is on front before shaking
  flipInner.classList.remove('flipped');
  answerDiv.classList.remove('visible');
  circle.style.opacity = '1';
  ball.classList.add('shaking');
  if (typeof playShakeSound === 'function') playShakeSound();
  const tapHint = document.getElementById('tapShakeHint'); if (tapHint) tapHint.style.opacity = '0';


  setTimeout(() => {
    ball.classList.remove('shaking');
    if (typeof stopShakeSound === 'function') stopShakeSound();
    if (tapHint) setTimeout(() => { tapHint.style.opacity = ''; }, 1000);
    const answer = BALL_ANSWERS[Math.floor(Math.random()*BALL_ANSWERS.length)];
    answerText.textContent = answer.text;
    circle.style.opacity = '0';
    answerDiv.classList.add('visible');
    responseEl.textContent = answer.text;
    setTimeout(() => {
      flipInner.classList.add('flipped');
      isBallShaking = false;

    }, 150);
  }, 750);
}

// ── TIMER ──
function setPreset(s, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  timerDuration = s; timerRemaining = s;
  if (timerRunning) pauseTimer();
  updateTimerDisplay(); resetRing();
}
function toggleStartPause() {
  if (timerRunning) {
    pauseTimer();
  } else {
    startTimer();
  }
}
function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById('startPauseBtn').textContent = '⏸ Pause';
  document.getElementById('timerLabel').textContent = 'seconds left to decide';
  const _drip = document.getElementById('sandDrip');
  if (_drip) { _drip.classList.remove('paused'); _drip.style.display = ''; }
  timerInterval = setInterval(() => {
    timerRemaining = Math.max(0, timerRemaining - 1);
    updateTimerDisplay(); updateRing();
    if (timerRemaining <= 0) { pauseTimer(); timerExpired(); }
  }, 1000);
}
function pauseTimer() {
  timerRunning = false; clearInterval(timerInterval);
  const btn = document.getElementById('startPauseBtn');
  if (btn) btn.textContent = '▶ Start';
  if (timerRemaining > 0 && timerRemaining < timerDuration) document.getElementById('timerLabel').textContent = 'paused';
  // Pause sand drip
  const drip = document.getElementById('sandDrip');
  if (drip) drip.classList.add('paused');
}
function resetTimer() {
  pauseTimer(); timerRemaining = timerDuration;
  updateTimerDisplay(); resetRing();
  document.getElementById('timerLabel').textContent = 'ready';
}
function updateTimerDisplay() {
  const safe = Math.max(0, timerRemaining);
  const m = Math.floor(safe/60), s = safe%60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = timerRemaining/timerDuration;
  document.getElementById('timerDisplay').style.color = pct>.5?'#283252':pct>.2?'#DD91BE':'#E05555';
}
function updateHourglass(pct) {
  // Upper triangle: y from 32 (top) to 118 (neck), height=86, half-width from 83 to 0
  // Sand fills BOTTOM pct of upper triangle
  const uH = 86, uTopY = 32, uHalfW = 83;
  const uFill = pct; // fraction of upper filled
  const uTopFraction = 1 - uFill; // empty from top
  const uSandTopY  = uTopY + uH * uTopFraction;
  const uSandHalfW = uHalfW * uFill;
  const upperSand = document.getElementById('upperSand');
  if (pct > 0.005) {
    upperSand.setAttribute('points',
      `${105-uSandHalfW},${uSandTopY} ${105+uSandHalfW},${uSandTopY} 109,118 101,118`);
  } else {
    upperSand.setAttribute('points', '105,118 105,118 105,118 105,118');
  }

  // Lower triangle: y from 130 (neck) to 218 (base), height=88, half-width from 0 to 83
  // Sand fills BOTTOM (1-pct) of lower triangle (accumulates)
  const lH = 88, lBotY = 218, lHalfW = 83;
  const lFill = 1 - pct;
  const lSandTopY  = lBotY - lH * lFill;
  const lSandHalfW = lHalfW * lFill;
  const lowerSand = document.getElementById('lowerSand');
  if (lFill > 0.005) {
    lowerSand.setAttribute('points',
      `${105-lSandHalfW},${lSandTopY} ${105+lSandHalfW},${lSandTopY} 192,218 18,218`);
  } else {
    lowerSand.setAttribute('points', '105,218 105,218 105,218 105,218');
  }

  // Pause drip when timer not running or done
  const drip = document.getElementById('sandDrip');
  if (drip) {
    drip.classList.toggle('paused', !timerRunning || pct <= 0);
    drip.style.display = (pct <= 0 || pct >= 1) ? 'none' : '';
  }

  // Colour the time display
  document.getElementById('timerDisplay').style.color =
    pct > 0.15 ? '#283252' : '#DD91BE';
}

function updateRing() { updateHourglass(timerRemaining/timerDuration); }

function resetRing() {
  updateHourglass(1);
  document.getElementById('timerDisplay').style.color = '#283252';
  const drip = document.getElementById('sandDrip');
  if (drip) { drip.classList.add('paused'); drip.style.display = 'none'; }
}
function timerExpired() {
  document.getElementById('timerLabel').textContent = "time's up!";
  setTimeout(() => showDecideModal(), 1000);
}

// ── DECIDE MODAL ──
function showDecideModal() {
  document.getElementById('decide-modal').classList.remove('hidden');
  if (aiResult) {
    document.getElementById('modalChoice').textContent = aiResult.winner;
    document.getElementById('modalTagline').textContent = `"${aiResult.tagline}"`;
    document.getElementById('modalReasoning').textContent = aiResult.reasoning;
  } else if (options.length > 0) {
    const pick = options[Math.floor(Math.random()*options.length)];
    document.getElementById('modalChoice').textContent = pick;
    document.getElementById('modalTagline').textContent = `"${MOCK_TAGLINES[Math.floor(Math.random()*MOCK_TAGLINES.length)]}"`;
    document.getElementById('modalReasoning').textContent = MOCK_REASONINGS[Math.floor(Math.random()*MOCK_REASONINGS.length)];
  }
  launchConfetti();
}
function closeModal() {
  document.getElementById('decide-modal').classList.add('hidden');
  // Auto-reset timer if it has expired
  if (timerRemaining <= 0) resetTimer();
}
function acceptDecision() { closeModal(); }

function launchConfetti() {
  const colors = ['#DD91BE','#E05555','#1A9E6E','#60A5FA','#C084FC','#F472B6'];
  for (let i=0;i<50;i++) setTimeout(() => {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}%;top:0;background:${colors[Math.floor(Math.random()*colors.length)]};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }, i*30);
}

// ── INIT ──
updateTimerDisplay();
resetRing();

// ── LOGO IMAGE FLIP ──
(function() {
  const images = [
    'decide-logos/7.png',
    'decide-logos/8.png',
    'decide-logos/9.png',
    'decide-logos/10.png',
    'decide-logos/11.png',
    'decide-logos/12.png',
    'decide-logos/13.png'
  ];
  let idx = 0;
  let dir = 1;
  const el = document.getElementById('flashLogo');

  // Preload all images so swaps are instant
  const preloaded = images.map(src => { const i = new Image(); i.src = src; return i; });

  // Single persistent img element — swap src/class instead of rebuilding
  const imgEl = document.createElement('img');
  imgEl.alt = 'decide';
  el.appendChild(imgEl);

  function showImage(src) {
    imgEl.src = src;
    imgEl.className = src.includes('13.png') ? 'logo-13' : '';
  }

  showImage(images[0]);

  setInterval(() => {
    idx += dir;
    if (idx >= images.length - 1 || idx <= 0) dir *= -1;
    showImage(images[idx]);
  }, 400);
})();
</script>
